<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2a1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="raioGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="raioGrad2" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7b7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="brilho">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sombra">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#34d399" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Fundo quadrado arredondado (estilo ícone app) -->
  <rect width="400" height="400" rx="80" ry="80" fill="url(#bgGrad)"/>
  <!-- Círculo decorativo de fundo atrás do raio -->
  <circle cx="200" cy="185" r="130" fill="#0d3d2e" opacity="0.5"/>
  <circle cx="200" cy="185" r="130" fill="none" stroke="#34d399" stroke-width="2" stroke-opacity="0.2"/>
  <!-- Raio principal grande -->
  <polygon
    points="230,60 148,200 186,200 170,340 252,188 214,188"
    fill="url(#raioGrad)"
    filter="url(#sombra)"
  />
  <!-- Raio inner highlight -->
  <polygon
    points="224,75 155,200 185,200 172,310 240,200 210,200"
    fill="url(#raioGrad2)"
    opacity="0.3"
  />
  <!-- Texto MOTO -->
  <text
    x="200" y="358"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#f9fafb"
    text-anchor="middle"
    letter-spacing="4"
  >MOTO</text>
  <!-- Underline verde sob MOTO -->
  <rect x="80" y="365" width="240" height="3" rx="2" fill="#34d399" opacity="0.6"/>
  <!-- Pequeno FAST abaixo -->
  <text
    x="200" y="392"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="26"
    fill="#34d399"
    text-anchor="middle"
    letter-spacing="8"
  >FAST</text>
</svg>
